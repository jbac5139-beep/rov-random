<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoV Random Challenge - Dragon vs Slayer Edition</title>
    <style>
        :root {
            --rov-space: #070913;
            --rov-gold: #f4bb44; 
            --rov-gold-hover: #e5a93b;
            --card-bg: rgba(6, 9, 22, 0.75); 
            --card-border: rgba(255, 255, 255, 0.1); 
            --text-main: #ffffff;
            --text-muted: #8fa0c0; 
            --success: #10b981;
        }

        /* 🌌 ส่วนพื้นหลัง GIF มังกรที่คุณส่งมา */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
            
            /* เปลี่ยนลิงก์พื้นหลังเป็นรูปมังกรชนดาร์กสเลเยอร์เรียบร้อยครับ */
            background-image: url('bg.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* 🎬 แผ่นฟิล์มโปร่งแสงทับพื้นหลัง ช่วยให้สบายตาขึ้นและอ่านตัวหนังสือสุ่มง่ายขึ้น */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(7, 9, 19, 0.65); /* 0.65 คือความเข้ม ถ้าอยากให้เห็นมังกรชัดๆ ทะลุขึ้นมาอีก ให้ลดเหลือ 0.4 หรือ 0.5 ได้ครับ */
            z-index: -1; 
        }

        .main-container {
            width: 100%;
            max-width: 850px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(244, 187, 68, 0.3); 
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        .btn-random {
            background: var(--rov-gold);
            color: #070913;
            border: none;
            padding: 16px 55px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px; 
            cursor: pointer;
            transition: all 0.25s ease-in-out;
            box-shadow: 0 4px 15px rgba(244, 187, 68, 0.25);
            margin-bottom: 35px;
        }

        .btn-random:hover:not(:disabled) {
            background: var(--rov-gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 187, 68, 0.4);
        }

        .btn-random:disabled {
            background: #22263f;
            color: #525a7a;
            box-shadow: none;
            cursor: not-allowed;
        }

        .result-box {
            display: none;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: left;
        }

        .lock-bounce {
            animation: lockBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) both;
            border-color: var(--rov-gold) !important;
            background: rgba(20, 25, 45, 0.85);
        }

        @keyframes lockBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .top-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .hero-card, .pos-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
            padding: 20px;
            flex: 1;
            min-width: 250px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }

        .hero-img {
            width: 75px;
            height: 75px;
            border-radius: 4px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
        }

        .pos-img {
            width: 55px;
            height: 55px;
            object-fit: contain;
        }

        .card-title {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 6px 0;
        }

        .card-value {
            color: var(--text-main);
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0;
        }

        .middle-meta {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
            padding: 25px;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }

        .section-header {
            color: var(--rov-gold);
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 0;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .rune-container {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .rune-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .rune-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .ench-container {
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .ench-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }

        .items-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
            padding: 25px;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
            gap: 15px;
            margin-top: 5px;
        }

        .item-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .item-img {
            width: 65px;
            height: 65px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .item-name {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            .result-box { padding: 20px; }
            .hero-card, .pos-card { flex: 1 1 100%; }
            .rune-container { display: grid; grid-template-columns: 1fr 1fr; }
            .btn-random { width: 100%; padding: 15px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>⚔️ RoV Random Challenge ⚔️</h1>
    <p class="subtitle">ระบบสุ่มท้าตายสไตล์ทางการ จัดเซ็ตทีมลุยกับเพื่อน</p>
    
    <button class="btn-random" id="btnRandom" onclick="startCascadeRandom()">⚡ เริ่มสุ่มความท้าทาย</button>

    <div class="result-box" id="resultBox">
        
        <div class="top-meta">
            <div class="hero-card" id="heroCard">
                <img id="heroImg" class="hero-img" src="" alt="Hero">
                <div>
                    <p class="card-title">ฮีโร่ท้าตาย</p>
                    <p id="heroName" class="card-value">?</p>
                </div>
            </div>
            <div class="pos-card" id="posCard">
                <img id="posImg" class="pos-img" src="" alt="Position">
                <div>
                    <p class="card-title">ตำแหน่ง / เลน</p>
                    <p id="posName" class="card-value">?</p>
                </div>
            </div>
        </div>

        <div class="middle-meta" id="middleMeta">
            <h3 class="section-header">การตั้งค่าพลังแฝงและรูน</h3>
            <p class="card-title" style="margin-bottom: 10px;">เซ็ตรูน Level 3 ที่ต้องใช้</p>
            <div class="rune-container">
                <div class="rune-item">
                    <div class="rune-dot" style="background-color: #ef4444;"></div>
                    <span id="runeRedName">?</span>
                </div>
                <div class="rune-item">
                    <div class="rune-dot" style="background-color: #a855f7;"></div>
                    <span id="runePurpleName">?</span>
                </div>
                <div class="rune-item">
                    <div class="rune-dot" style="background-color: #22c55e;"></div>
                    <span id="runeGreenName">?</span>
                </div>
            </div>

            <p class="card-title" style="margin-bottom: 10px;">พลังแฝงหลัก</p>
            <div class="ench-container">
                <img id="enchImg" class="ench-img" src="" alt="Enchantment">
                <span id="enchName" class="card-value" style="font-size: 1.1rem;">?</span>
            </div>
        </div>

        <div class="items-section" id="itemsSection">
            <h3 class="section-header">ไอเทมบังคับออก (6 ชิ้น)</h3>
            <div class="items-grid" id="itemsGrid"></div>
        </div>

    </div>
</div>

<script src="data.js"></script>

<script>
function getRandomElement(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function getRandomItems(arr, count) {
    let shuffled = [...arr].sort(() => 0.5 - Math.random());
    return shuffled.slice(0, count);
}

function startCascadeRandom() {
    const btn = document.getElementById("btnRandom");
    const resultBox = document.getElementById("resultBox");
    
    const cards = ["heroCard", "posCard", "middleMeta", "itemsSection"];
    cards.forEach(id => document.getElementById(id).classList.remove("lock-bounce"));

    resultBox.style.display = "block";
    resultBox.scrollIntoView({ behavior: 'smooth' });

    btn.disabled = true;
    btn.innerText = "⚡ กำลังสุ่ม...";

    const finalHero = getRandomElement(heroesData);
    const finalPos = getRandomElement(positionsData);
    const finalRuneRed = getRandomElement(runesRed);
    const finalRunePurple = getRandomElement(runesPurple);
    const finalRuneGreen = getRandomElement(runesGreen);
    const finalEnch = getRandomElement(enchantmentsData);
    const finalItems = getRandomItems(itemsPoolData, 6);

    let currentTick = 0;
    const tickSpeed = 50; 

    const stopHeroTick = 12;       
    const stopPosTick = 22;        
    const stopMiddleTick = 32;     
    const stopItemsTick = 42;      

    const intervalId = setInterval(() => {
        currentTick++;

        if (currentTick < stopHeroTick) {
            const rand = getRandomElement(heroesData);
            document.getElementById("heroName").innerText = rand.name;
            document.getElementById("heroImg").src = rand.imgUrl;
        } else if (currentTick === stopHeroTick) {
            document.getElementById("heroName").innerText = finalHero.name;
            document.getElementById("heroImg").src = finalHero.imgUrl;
            document.getElementById("heroCard").classList.add("lock-bounce");
        }

        if (currentTick < stopPosTick) {
            const rand = getRandomElement(positionsData);
            document.getElementById("posName").innerText = rand.name;
            document.getElementById("posImg").src = rand.imgUrl;
        } else if (currentTick === stopPosTick) {
            document.getElementById("posName").innerText = finalPos.name;
            document.getElementById("posImg").src = finalPos.imgUrl;
            document.getElementById("posCard").classList.add("lock-bounce");
        }

        if (currentTick < stopMiddleTick) {
            document.getElementById("runeRedName").innerText = getRandomElement(runesRed);
            document.getElementById("runePurpleName").innerText = getRandomElement(runesPurple);
            document.getElementById("runeGreenName").innerText = getRandomElement(runesGreen);
            
            const rand = getRandomElement(enchantmentsData);
            document.getElementById("enchName").innerText = rand.name;
            document.getElementById("enchImg").src = rand.imgUrl;
        } else if (currentTick === stopMiddleTick) {
            document.getElementById("runeRedName").innerText = finalRuneRed;
            document.getElementById("runePurpleName").innerText = finalRunePurple;
            document.getElementById("runeGreenName").innerText = finalRuneGreen;
            document.getElementById("enchName").innerText = finalEnch.name;
            document.getElementById("enchImg").src = finalEnch.imgUrl;
            document.getElementById("middleMeta").classList.add("lock-bounce");
        }

        if (currentTick < stopItemsTick) {
            const randItems = getRandomItems(itemsPoolData, 6);
            renderItems(randItems);
        } else if (currentTick === stopItemsTick) {
            renderItems(finalItems);
            document.getElementById("itemsSection").classList.add("lock-bounce");
            
            clearInterval(intervalId);
            btn.disabled = false;
            btn.innerText = "⚡ สุ่มใหม่อีกที !";
        }

    }, tickSpeed);
}

function renderItems(itemsList) {
    const gridContainer = document.getElementById("itemsGrid");
    gridContainer.innerHTML = "";
    itemsList.forEach(item => {
        gridContainer.innerHTML += `
            <div class="item-card">
                <img src="${item.imgUrl}" alt="${item.name}" class="item-img">
                <p class="item-name">${item.name}</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
